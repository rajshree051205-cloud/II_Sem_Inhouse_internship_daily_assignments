<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Cards</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="row g-4">

        <!-- Student 1 -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h4>Raj</h4>
                    <p>BCA Student</p>

                    <button class="btn btn-primary toggle-btn">
                        Show Details
                    </button>

                    <div class="details mt-3" style="display:none;">
                        <hr>
                        <p><strong>Age:</strong> 20</p>
                        <p><strong>Email:</strong> raj@gmail.com</p>
                        <p><strong>Phone:</strong> 9876543210</p>
                        <p><strong>Address:</strong> Jaipur</p>
                    </div>

                </div>
            </div>
        </div>

        <!-- Student 2 -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h4>Priya</h4>
                    <p>B.Tech Student</p>

                    <button class="btn btn-primary toggle-btn">
                        Show Details
                    </button>

                    <div class="details mt-3" style="display:none;">
                        <hr>
                        <p><strong>Age:</strong> 21</p>
                        <p><strong>Email:</strong> priya@gmail.com</p>
                        <p><strong>Phone:</strong> 9999999999</p>
                        <p><strong>Address:</strong> Delhi</p>
                    </div>

                </div>
            </div>
        </div>

        <!-- Student 3 -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h4>Aman</h4>
                    <p>MCA Student</p>

                    <button class="btn btn-primary toggle-btn">
                        Show Details
                    </button>

                    <div class="details mt-3" style="display:none;">
                        <hr>
                        <p><strong>Age:</strong> 22</p>
                        <p><strong>Email:</strong> aman@gmail.com</p>
                        <p><strong>Phone:</strong> 8888888888</p>
                        <p><strong>Address:</strong> Mumbai</p>
                    </div>

                </div>
            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
